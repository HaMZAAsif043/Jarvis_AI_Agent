<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS AI</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2332;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --accent: #06b6d4;
    --accent-dim: #0891b2;
    --glow: rgba(6,182,212,0.15);
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --font: 'Segoe UI', system-ui, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* Grid layout */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
  }

  /* Header */
  .header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
  }

  .header .logo {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 20px var(--glow);
    letter-spacing: 3px;
  }

  .header .logo span { color: var(--text); letter-spacing: 0; }

  .header .status {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }

  .header .status .dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(16,185,129,0.4); }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    padding: 16px 16px 8px;
  }

  .quick-actions {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .quick-action {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    text-align: left;
    transition: all 0.2s;
    font-family: var(--font);
  }

  .quick-action:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--glow);
  }

  .quick-action .icon { margin-right: 6px; }

  .tool-list {
    padding: 0 12px;
    flex-shrink: 0;
  }

  .tool-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    margin-bottom: 4px;
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .tool-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 12px;
  }

  .history-item {
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 4px;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-dim);
    border-left: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-item:hover {
    background: var(--surface2);
    color: var(--text);
    border-left-color: var(--accent);
  }

  /* Main chat area */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--accent-dim);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg.jarvis {
    align-self: flex-start;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    font-family: var(--mono);
    font-size: 12px;
  }

  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    border: 1px dashed var(--border);
    padding: 6px 12px;
    max-width: 90%;
  }

  /* Tool call card */
  .tool-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 10px 14px;
    margin: 6px 0;
  }

  .tool-card .tool-header {
    font-size: 11px;
    color: var(--accent);
    font-family: var(--mono);
  }

  .tool-card .tool-status {
    font-size: 10px;
    font-family: var(--mono);
    margin-top: 4px;
  }

  .tool-card .tool-status.running { color: var(--yellow); }
  .tool-card .tool-status.success { color: var(--green); }
  .tool-card .tool-status.error { color: var(--red); }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
  }

  .typing .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.4s infinite;
  }

  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Input area */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .input-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--glow);
  }

  .input-wrap input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .send-btn {
    background: var(--accent-dim);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.2s;
    font-family: var(--font);
  }

  .send-btn:hover { background: var(--accent); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg { animation: fadeIn 0.3s ease; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Responsive */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
</style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">J<span>ARVIS</span> AI</div>
      <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <h3>Quick Actions</h3>
      <div class="quick-actions">
        <button class="quick-action" onclick="quickAction('Search my Desktop for all PDF files.')">
          <span class="icon">&#128269;</span> Find PDF Files
        </button>
        <button class="quick-action" onclick="quickAction('Take a screenshot of my screen.')">
          <span class="icon">&#128248;</span> Take Screenshot
        </button>
        <button class="quick-action" onclick="quickAction('List all open windows on my PC.')">
          <span class="icon">&#128425;</span> List Windows
        </button>
        <button class="quick-action" onclick="quickAction('Open google.com in the browser and get page text.')">
          <span class="icon">&#127760;</span> Browse & Extract
        </button>
        <button class="quick-action" onclick="quickAction('Show my recent task history.')">
          <span class="icon">&#128203;</span> Recent Tasks
        </button>
      </div>

      <h3 style="margin-top: 16px;">Tools</h3>
      <div class="tool-list">
        <div class="tool-item"><span>file_manager</span><div class="dot"></div></div>
        <div class="tool-item"><span>browser</span><div class="dot"></div></div>
        <div class="tool-item"><span>desktop</span><div class="dot"></div></div>
        <div class="tool-item"><span>terminal</span><div class="dot"></div></div>
      </div>

      <h3 style="margin-top: 16px;">History</h3>
      <div class="history-list" id="historyList">
        <div style="color: var(--text-dim); font-size: 11px; padding: 8px 10px;">Loading...</div>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="chat" id="chat"></div>

      <div class="input-area">
        <div class="input-wrap">
          <input id="input" type="text" placeholder="Ask JARVIS anything..." autocomplete="off" />
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const historyList = document.getElementById('historyList');

  let ws;
  let isExecuting = false;
  const toolCards = {};

  // Connect WebSocket
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws/execute`);

    ws.onopen = () => {
      statusDot.classList.add('connected');
      statusText.textContent = 'Connected';
      addSystemMessage('Connected to JARVIS');
    };

    ws.onclose = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Reconnecting...';
      addSystemMessage('Disconnected. Reconnecting in 3s...');
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      ws.close();
    };

    ws.onmessage = async (event) => {
      try {
        const msg = JSON.parse(event.data);
        handleEvent(msg.type, msg.data);
      } catch (e) {
        console.error('Parse error:', e);
      }
    };
  }

  function handleEvent(type, data) {
    switch (type) {
      case 'thinking':
        removeTyping();
        addTypingIndicator();
        break;

      case 'tool_start':
        addToolCard(data.index, data.tool, data.params, 'running');
        break;

      case 'tool_result':
        updateToolCard(data.index, data.tool, data.output, 'success');
        break;

      case 'tool_error':
        updateToolCard(data.index || '?', data.tool, data.error, 'error');
        break;

      case 'safety_block':
        addJarvisMsg('Blocked: ' + (typeof data === 'string' ? data : JSON.stringify(data)));
        break;

      case 'done':
        removeTyping();
        if (data.type === 'chat') {
          addJarvisMsg(data.text);
        } else {
          addJarvisMsg('Done! ' + data.text);
        }
        setExecuting(false);
        loadHistory();
        break;

      case 'error':
        removeTyping();
        const errMsg = typeof data === 'string' ? data : (data?.message || 'Unknown error');
        addSystemMessage('Error: ' + errMsg);
        setExecuting(false);
        break;

      case 'pong':
        break;

      default:
        addSystemMessage('Unknown event: ' + type);
    }
  }

  // Sending messages
  async function executeCommand(action) {
    if (isExecuting || !action.trim()) return;
    setExecuting(true);
    addUserMessage(action.trim());
    clearToolCards();

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: action.trim() }));
    } else {
      addSystemMessage('Not connected to JARVIS');
      setExecuting(false);
    }
    input.value = '';
  }

  function sendMessage() {
    const val = input.value.trim();
    if (val) executeCommand(val);
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  function quickAction(text) {
    executeCommand(text);
  }

  function setExecuting(state) {
    isExecuting = state;
    input.disabled = state;
    sendBtn.disabled = state;
    if (!state) input.focus();
  }

  // Chat rendering
  function addUserMessage(text) {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.textContent = text;
    appendAndScroll(div);
  }

  function addJarvisMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg jarvis';
    div.textContent = text;
    appendAndScroll(div);
  }

  function addSystemMessage(text) {
    const div = document.createElement('div');
    div.className = 'msg system';
    div.textContent = text;
    appendAndScroll(div);
  }

  function addTypingIndicator() {
    removeTyping();
    const div = document.createElement('div');
    div.className = 'msg jarvis typing';
    div.id = 'typingIndicator';
    for (let i = 0; i < 3; i++) {
      const d = document.createElement('div'); d.className = 'dot'; div.appendChild(d);
    }
    appendAndScroll(div);
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function addToolCard(index, tool, params, status) {
    clearToolCard(index);
    const div = document.createElement('div');
    div.className = 'tool-card';
    div.id = 'tool_' + index;
    div.innerHTML = `
      <div class="tool-header">[${tool}]</div>
      <div class="tool-status ${status}">&#9679; running</div>
      ${params ? '<div style="font-size:10px;color:var(--text-dim);margin-top:4px;font-family:var(--mono);">' + escHtml(JSON.stringify(params)) + '</div>' : ''}
    `;
    const wrapped = document.createElement('div');
    wrapped.className = 'msg jarvis';
    wrapped.style.maxWidth = '85%';
    wrapped.style.alignSelf = 'flex-start';
    wrapped.appendChild(div);
    chat.appendChild(wrapped);
    scrollBottom();
    toolCards[index] = div;
  }

  function updateToolCard(index, tool, text, status) {
    const card = toolCards[index];
    if (card) {
      const statusEl = card.querySelector('.tool-status');
      if (statusEl) {
        statusEl.className = 'tool-status ' + status;
        statusEl.textContent = (status === 'success' ? '&#9679; success' : status === 'error' ? '&#9679; ERROR' : '&#9679; running')
      }
      const outDiv = document.createElement('div');
      outDiv.style.cssText = 'font-size:11px;margin-top:6px;color:var(--text-dim);font-family:var(--mono);word-break:break-all;';
      outDiv.textContent = text;
      card.appendChild(outDiv);
    }
  }

  function clearToolCard(index) {
    const card = toolCards[index];
    if (card) card.remove();
  }

  function clearToolCards() {
    Object.keys(toolCards).forEach(k => delete toolCards[k]);
  }

  function appendAndScroll(el) {
    chat.appendChild(el);
    scrollBottom();
  }

  function scrollBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Load task history
  async function loadHistory() {
    try {
      const res = await fetch('/api/tasks');
      const tasks = await res.json();
      historyList.innerHTML = '';
      if (!tasks.length) {
        historyList.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:8px;">No tasks yet</div>';
        return;
      }
      for (const t of tasks) {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.textContent = t.user_input;
        div.title = t.user_input;
        div.addEventListener('click', () => executeCommand(t.user_input));
        historyList.appendChild(div);
      }
    } catch (_) {
      // silent fail
    }
  }

  // Init
  connect();
  loadHistory();
  input.focus();
</script>
</body>
</html>
